<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mortgage Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:#07090f;min-height:100vh;font-family:'Mulish',sans-serif;color:#e2e8f5}
input,select,textarea,button{font-family:'Mulish',sans-serif}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:rgba(56,189,248,.5)!important}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;cursor:pointer;background:rgba(255,255,255,.15)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;border:2px solid #07090f;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:4px}
button{cursor:pointer}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#4b5674;text-transform:uppercase;letter-spacing:1.2px;padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:10px;font-size:13px;color:#e2e8f5;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.card{background:#0c1018;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700}
@media(max-width:640px){
  .g2{grid-template-columns:1fr!important}
  .nav-lbl{display:none}
  .card{padding:16px!important}
  th{padding:6px 8px}td{padding:8px;font-size:12px}
  .stat-row>div{flex:1 1 calc(50% - 5px)!important;padding:12px 14px!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK='mortgageDashV1';
const INIT={loan:{balance:928418.3,offset:78642.01,rate:6.04,payment:5832,origBalance:1025257,origEnd:'2051-09'},strategy:{extraMonthly:250,fortnightly:false,annualLump:4000},history:[],repayments:[]};

// ── Utils ─────────────────────────────────────────────────────────────────────
const fA=n=>!isFinite(n)?'—':new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(n);
const fA2=n=>!isFinite(n)?'—':new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fD=m=>{if(!isFinite(m)||m>900)return'—';const d=new Date();d.setMonth(d.getMonth()+Math.round(m));return d.toLocaleDateString('en-AU',{month:'short',year:'numeric'})};
const fY=m=>{if(!isFinite(m)||m>900||m<0)return'—';const y=Math.floor(m/12),mo=Math.round(m%12);return y===0?`${mo}mo`:mo===0?`${y}y`:`${y}y ${mo}mo`};
const fMo=s=>{if(!s)return'';const[y,m]=s.split('-');return new Date(+y,+m-1).toLocaleDateString('en-AU',{month:'short',year:'numeric'})};
const nowYM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const pn=id=>parseFloat((document.getElementById(id)?.value||'').replace(/[^0-9.]/g,''))||0;

// ── Storage ───────────────────────────────────────────────────────────────────
let D=(() =>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch{return null}})() || JSON.parse(JSON.stringify(INIT));
function saveData(){try{localStorage.setItem(SK,JSON.stringify(D));flashSaved()}catch(e){}}
function flashSaved(){const el=document.getElementById('si');if(el){el.textContent='✓ Saved';el.style.color='#00d68f';setTimeout(()=>{el.textContent='';el.style.color='#4b5674'},2500)}}

// ── Amortise ──────────────────────────────────────────────────────────────────
function amort({balance,offset,ratePA,pmt,ppy=12,lump=0}){
  const r=ratePA/100/ppy;let bal=balance,ti=0,p=0;
  const pts=[{y:0,b:Math.round(bal)}];
  while(bal>0.5&&p<ppy*55){
    const eff=Math.max(0,bal-offset),int=eff*r,pr=pmt-int;
    if(pr<=0.005)return{months:Infinity,totalInt:Infinity,pts};
    ti+=int;bal=Math.max(0,bal-Math.min(pr,bal));p++;
    if(lump>0&&p%ppy===0&&bal>0)bal=Math.max(0,bal-lump);
    if(p%ppy===0)pts.push({y:p/ppy,b:Math.round(Math.max(0,bal))});
  }
  if(bal>0.5)return{months:Infinity,totalInt:Infinity,pts};
  if(p%ppy!==0)pts.push({y:Math.ceil(p/ppy),b:0});
  return{months:ppy===12?p:Math.round(p/ppy*12),totalInt:ti,pts};
}

// ── Shared helpers ────────────────────────────────────────────────────────────
const C={bg:'#07090f',surf:'#0c1018',border:'rgba(255,255,255,.07)',text:'#e2e8f5',muted:'#4b5674',green:'#00d68f',blue:'#38bdf8',amber:'#fbbf24',red:'#f87171',purple:'#c084fc',orange:'#fb923c'};
const INP=`background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e2e8f5;font-size:14px;padding:10px 12px;width:100%`;
const kv=(l,v,c)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid ${C.border}"><span style="font-size:12px;color:${C.muted}">${l}</span><span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:${c||C.text}">${v}</span></div>`;
const pbtn=(l,id,bg)=>`<button id="${id}" style="padding:10px 20px;border-radius:8px;border:none;background:${bg};color:#07090f;font-weight:700;font-size:14px">${l}</button>`;

// ── Transfer reminders ────────────────────────────────────────────────────────
function reminderBanner(){
  const pending=D.history.filter(h=>h.extra>0&&!h.extraTransferred);
  if(!pending.length)return'';
  return pending.map(p=>`<div style="background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.35);border-radius:14px;padding:16px 18px;margin-bottom:18px;display:flex;gap:14px;align-items:flex-start">
    <span style="font-size:20px;flex-shrink:0">⏰</span>
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px;color:${C.amber};margin-bottom:4px">Transfer Reminder — ${fMo(p.month)}</div>
      <p style="font-size:13px;color:${C.muted};margin:0 0 10px;line-height:1.6">You paid <strong style="color:${C.text}">${fA(p.extra)}</strong> above your minimum. This is sitting in your offset — to reduce the actual loan balance, transfer <strong style="color:${C.amber}">${fA(p.extra)}</strong> directly to your loan account.</p>
      <button onclick="markTransferred('${p.id}')" style="padding:7px 16px;border-radius:7px;border:none;background:${C.amber};color:#07090f;font-weight:700;font-size:12px;cursor:pointer">✓ Done — I've transferred it</button>
    </div>
  </div>`).join('');
}

// ── SVG chart (simple) ────────────────────────────────────────────────────────
function svgChart(hist,proj,base){
  const baseYear=new Date().getFullYear();
  const hM={},pM={},bM={};
  hist.forEach(h=>{const yr=h.month?parseInt(h.month.split('-')[0])-baseYear:0;if(yr>=0)hM[yr]=h.balance});
  proj.pts.forEach(p=>pM[p.y]=p.b);
  base.pts.forEach(p=>bM[p.y]=p.b);
  const data=Array.from({length:31},(_,y)=>{
    const pt={year:y,label:String(baseYear+y)};
    if(hM[y]!=null)pt.actual=hM[y];
    if(pM[y]!=null)pt.projected=pM[y];else if(isFinite(proj.months)&&y>proj.months/12)pt.projected=0;
    if(bM[y]!=null)pt.noExtra=bM[y];else if(isFinite(base.months)&&y>base.months/12)pt.noExtra=0;
    return pt;
  });
  const W=800,H=180,PL=56,PB=24,PT=8,PR=8,iW=W-PL-PR,iH=H-PT-PB;
  const allV=data.flatMap(d=>[d.actual,d.projected,d.noExtra].filter(v=>v!=null));
  if(!allV.length)return'';
  const maxY=Math.max(...allV)||1;
  const px=y=>PL+(y/30)*iW,py=v=>PT+iH-(v/maxY)*iH;
  const pts=key=>data.filter(d=>d[key]!=null).map(d=>`${px(d.year).toFixed(0)},${py(d[key]).toFixed(0)}`).join(' ');
  const xTk=data.filter(d=>d.year%5===0);
  const yTk=[0,.5,1].map(t=>({v:maxY*t,y:py(maxY*t)}));
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${yTk.map(t=>`<line x1="${PL}" x2="${W-PR}" y1="${t.y.toFixed(0)}" y2="${t.y.toFixed(0)}" stroke="rgba(255,255,255,.04)"/>
    <text x="${PL-4}" y="${(t.y+4).toFixed(0)}" text-anchor="end" font-size="10" fill="${C.muted}">$${(t.v/1000).toFixed(0)}K</text>`).join('')}
    ${xTk.map(d=>`<text x="${px(d.year).toFixed(0)}" y="${H-3}" text-anchor="middle" font-size="10" fill="${C.muted}">${d.label}</text>`).join('')}
    ${pts('noExtra')?`<polyline points="${pts('noExtra')}" fill="none" stroke="${C.red}" stroke-width="1.5" stroke-dasharray="5,3"/>`:''}
    ${pts('projected')?`<polyline points="${pts('projected')}" fill="none" stroke="${C.blue}" stroke-width="2"/>`:''}
    ${pts('actual')?`<polyline points="${pts('actual')}" fill="none" stroke="${C.green}" stroke-width="2.5"/>`:''}
    ${data.filter(d=>d.actual!=null).map(d=>`<circle cx="${px(d.year).toFixed(0)}" cy="${py(d.actual).toFixed(0)}" r="4" fill="${C.green}" stroke="${C.bg}" stroke-width="2"/>`).join('')}
  </svg>
  <div style="display:flex;gap:16px;font-size:11px;color:${C.muted};justify-content:center;margin-top:6px">
    <span><svg width="18" height="8" style="vertical-align:middle;margin-right:4px"><line x1="0" y1="4" x2="18" y2="4" stroke="${C.red}" stroke-width="1.5" stroke-dasharray="4,3"/></svg>No extras</span>
    <span><svg width="18" height="8" style="vertical-align:middle;margin-right:4px"><line x1="0" y1="4" x2="18" y2="4" stroke="${C.blue}" stroke-width="2"/></svg>Your strategy</span>
    <span><svg width="8" height="8" style="vertical-align:middle;margin-right:4px"><circle cx="4" cy="4" r="3" fill="${C.green}"/></svg>Actual</span>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// DASHBOARD — the daily driver
// ═══════════════════════════════════════════════════════════════════════
function renderDash(){
  const l=D.loan,bal=l.balance,off=l.offset,rate=l.rate||6.04,pmt=l.payment||5832;
  const eff=Math.max(0,bal-off);
  const proj=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy:12}):{months:Infinity,totalInt:Infinity,pts:[]};
  const origBal=l.origBalance||bal||1;
  const paidPct=origBal>0?((origBal-bal)/origBal*100).toFixed(1):'0.0';
  const lastEntry=D.history.length>0?D.history[D.history.length-1]:null;
  const dropped=lastEntry?(D.history[0].balance-bal):0;

  // Payment preview calc
  const lastBal=lastEntry?.balance||bal;
  const lastOff=lastEntry?.offset||off;
  const initInt=Math.max(0,lastBal-lastOff)*rate/100/12;
  const initPrincipal=Math.max(0,pmt-initInt);
  const initNewBal=Math.round(Math.max(0,lastBal-initPrincipal)*100)/100;

  if(!bal)return`<div style="text-align:center;padding:60px 20px;color:${C.muted}">
    <div style="font-size:40px;margin-bottom:16px">🏠</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:${C.text};margin-bottom:8px">Welcome</div>
    <p style="font-size:14px;line-height:1.7;margin-bottom:24px">Set up your loan details in <strong style="color:${C.text}">Tools → Settings</strong> to get started.</p>
    <button onclick="setTab('tools')" style="padding:10px 24px;border-radius:8px;border:none;background:${C.blue};color:#07090f;font-weight:700;font-size:14px;cursor:pointer">Go to Settings →</button>
  </div>`;

  return`<div>
${reminderBanner()}

<!-- STATS ROW -->
<div class="stat-row" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
  ${[
    ['Loan Balance',fA(bal),C.red,''],
    ['Offset',fA(off),C.green,''],
    ['Effective Balance',fA(eff),C.blue,'loan − offset'],
    ['Interest Rate',`${rate}%`,C.amber,'p.a.'],
  ].map(([l,v,c,s])=>`<div style="flex:1 1 130px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid ${C.border};border-top:2px solid ${c};border-radius:13px">
    <div style="font-size:9px;color:${C.muted};text-transform:uppercase;letter-spacing:1.4px;margin-bottom:5px">${l}</div>
    <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:${C.text}">${v}</div>
    ${s?`<div style="font-size:10px;color:${C.muted};margin-top:2px">${s}</div>`:''}
  </div>`).join('')}
</div>

<!-- PAYOFF HERO -->
<div style="background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(0,214,143,.05));border:1px solid rgba(56,189,248,.2);border-radius:18px;padding:22px;margin-bottom:20px;text-align:center">
  <div style="font-size:11px;color:${C.muted};text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Projected Payoff</div>
  <div style="font-family:'Syne',sans-serif;font-size:clamp(28px,6vw,42px);font-weight:800;color:${C.text};letter-spacing:-1px;margin-bottom:6px">${fD(proj.months)}</div>
  <div style="font-size:15px;color:${C.blue};font-weight:600">${fY(proj.months)} remaining</div>
  ${isFinite(proj.totalInt)?`<div style="font-size:12px;color:${C.muted};margin-top:6px">${fA(proj.totalInt)} total interest at current pace</div>`:''}
</div>

<!-- PROGRESS -->
<div class="card" style="margin-bottom:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span style="font-size:13px;font-weight:600">Loan paid off</span>
    <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${C.green}">${paidPct}%</span>
  </div>
  <div style="background:rgba(255,255,255,.06);border-radius:999px;height:10px;overflow:hidden;margin-bottom:10px">
    <div style="width:${paidPct}%;height:100%;background:linear-gradient(90deg,${C.green},${C.blue});border-radius:999px;transition:width .5s"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:12px;color:${C.muted}">
    <span>${fA(origBal)} original</span>
    ${dropped>0?`<span style="color:${C.green}">↓ ${fA(dropped)} reduced since tracking</span>`:''}
    <span>${fA(bal)} remaining</span>
  </div>
</div>

<!-- PAYMENT LOGGER -->
<div style="background:linear-gradient(135deg,rgba(0,214,143,.08),rgba(56,189,248,.04));border:1px solid rgba(0,214,143,.25);border-radius:18px;padding:22px;margin-bottom:20px">
  <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px">Log a Payment</div>
  <p style="font-size:12px;color:${C.muted};margin:0 0 18px">Enter what you paid — the new balance is calculated for you.</p>
  <div class="g2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div>
      <label style="font-size:11px;color:${C.muted};display:block;margin-bottom:6px">How much did you pay? ($)</label>
      <input id="h-paid" value="${pmt}" style="${INP}">
      <div style="font-size:10px;color:${C.muted};margin-top:4px">Minimum is ${fA(pmt)} — enter whatever you actually paid</div>
    </div>
    <div>
      <label style="font-size:11px;color:${C.muted};display:block;margin-bottom:6px">Offset balance today ($)</label>
      <input id="h-off" value="${Math.round(lastOff)}" style="${INP}">
    </div>
  </div>

  <!-- Live preview -->
  <div id="h-preview" style="background:rgba(0,0,0,.2);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px">
      <span style="color:${C.muted}">Interest: <strong style="color:${C.red};font-family:'DM Mono',monospace">${fA(initInt)}</strong></span>
      <span style="color:${C.muted}">Principal: <strong style="color:${C.green};font-family:'DM Mono',monospace">${fA(initPrincipal)}</strong></span>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;color:${C.muted};text-transform:uppercase;letter-spacing:1px">New balance</div>
      <div id="h-newbal" style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:${C.green}">${fA2(initNewBal)}</div>
    </div>
  </div>

  <!-- Rate change toggle -->
  <div style="margin-bottom:16px">
    <button id="h-rate-toggle" style="background:none;border:none;padding:0;color:${C.blue};font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px">
      <span id="h-rate-arrow">▶</span> Rate or repayment changed this month?
    </button>
    <div id="h-rate-panel" style="display:none;margin-top:12px;padding:14px;background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:10px">
      <div style="font-size:12px;color:${C.amber};font-weight:600;margin-bottom:10px">Update rate &amp; repayment</div>
      <div class="g2" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">New interest rate (% p.a.)</label>
          <input id="h-rate" type="number" step="0.01" value="${rate}" style="${INP}"></div>
        <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">New minimum repayment ($)</label>
          <input id="h-newpmt" value="${pmt}" style="${INP}"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    ${pbtn('✓ Record Payment','h-save',C.green)}
    <span style="font-size:11px;color:${C.muted}">Month: ${fMo(nowYM())}</span>
    <span id="h-msg" style="font-size:12px;color:${C.green};font-family:'DM Mono',monospace"></span>
  </div>
</div>

<!-- CHART -->
${D.history.length>1?`<div class="card">
  <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px">📈 Balance Over Time</div>
  <p style="font-size:12px;color:${C.muted};margin:0 0 14px">Your actual progress vs projection</p>
  ${svgChart(D.history,proj,proj)}
</div>`:''}
</div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════════════════════════════
window._sec=window._sec||{calc:true,sugg:false,extra:false,hist:true,sett:false};
window.secToggle=function(k){
  window._sec[k]=!window._sec[k];
  const el=document.getElementById('sec-'+k),ar=document.getElementById('arr-'+k);
  if(el)el.style.display=window._sec[k]?'block':'none';
  if(ar)ar.textContent=window._sec[k]?'▼':'▶';
};

function collSec(k,icon,title,body){
  const open=!!window._sec[k];
  return`<div style="margin-bottom:10px;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden">
    <button onclick="secToggle('${k}')" style="width:100%;padding:14px 18px;border:none;background:rgba(255,255,255,.02);cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left">
      <span style="font-size:18px">${icon}</span>
      <span style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#e2e8f5;flex:1">${title}</span>
      <span id="arr-${k}" style="color:#4b5674;font-size:14px">${open?'▼':'▶'}</span>
    </button>
    <div id="sec-${k}" style="display:${open?'block':'none'};padding:18px;border-top:1px solid rgba(255,255,255,.07)">${body}</div>
  </div>`;
}

function renderTools(){
  const l=D.loan,bal=l.balance,off=l.offset,rate=l.rate||6.04,pmt=l.payment||5832;
  const LUMP=[1000,2000,4000,8000,10000],LCOLS=['#fb923c','#fbbf24','#4ade80','#38bdf8','#c084fc'];
  const base=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy:12}):{months:Infinity,totalInt:Infinity,pts:[]};
  const CXe=window._CX||{extra:D.strategy.extraMonthly||0,lump:D.strategy.annualLump||0,fn:D.strategy.fortnightly||false};
  window._CX=CXe;
  const cpmt=CXe.fn?(pmt+CXe.extra)/2:(pmt+CXe.extra),cppy=CXe.fn?26:12;
  const cproj=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt:cpmt,ppy:cppy,lump:CXe.lump}):{months:Infinity,totalInt:Infinity};
  const cmoS=isFinite(base.months)&&isFinite(cproj.months)?base.months-cproj.months:0;
  const cintS=isFinite(base.totalInt)&&isFinite(cproj.totalInt)?base.totalInt-cproj.totalInt:0;
  const LUMPROWS=LUMP.map((ls,i)=>{const r=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy:12,lump:ls}):{months:Infinity,totalInt:Infinity};return`<tr><td style="font-family:'DM Mono',monospace;font-weight:700;color:${LCOLS[i]}">${fA(ls)}</td><td style="font-family:'DM Mono',monospace">${fD(r.months)}</td><td style="font-weight:600">${fY(r.months)}</td><td style="font-family:'DM Mono',monospace;color:#00d68f;font-weight:700">${isFinite(base.months)&&isFinite(r.months)?fY(base.months-r.months):'—'}</td><td style="font-family:'DM Mono',monospace;color:#00d68f;font-weight:700">${isFinite(base.totalInt)&&isFinite(r.totalInt)?fA(base.totalInt-r.totalInt):'—'}</td></tr>`;}).join('');

  // slider with inline text input
  const slRow=(sid,iid,label,val,max,step,col)=>`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:#94a3b8">${label}</span>
      <div style="display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.3);border:1px solid ${col}50;border-radius:8px;padding:3px 8px">
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:#4b5674">$</span>
        <input id="${iid}" type="text" inputmode="numeric" value="${val.toLocaleString('en-AU')}" style="background:transparent;border:none;font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:${col};width:68px;outline:none;text-align:right;padding:0">
      </div>
    </div>
    <input id="${sid}" type="range" min="0" max="${max}" step="${step}" value="${Math.min(val,max)}" style="width:100%;accent-color:${col}">
  </div>`;

  // ── Suggestions ──────────────────────────────────────────────────────────
  const wk50mo=Math.round(50*52/12),wk100mo=Math.round(100*52/12);
  const sv=r=>({mo:isFinite(base.months)&&isFinite(r.months)?base.months-r.months:0,int:isFinite(base.totalInt)&&isFinite(r.totalInt)?base.totalInt-r.totalInt:0});
  const SUGG=bal>0?[
    {icon:'🔄',col:'#38bdf8',title:'Switch to fortnightly',detail:`Pay ${fA(Math.round(pmt/2))} per fortnight — 26 payments/year, one free extra annually.`,r:amort({balance:bal,offset:off,ratePA:rate,pmt:pmt/2,ppy:26}),act:{e:0,f:true,l:0}},
    {icon:'☕',col:'#fb923c',title:'Add $50 per week',detail:`${fA(wk50mo)}/month extra — small but compounding.`,r:amort({balance:bal,offset:off,ratePA:rate,pmt:pmt+wk50mo,ppy:12}),act:{e:wk50mo,f:false,l:0}},
    {icon:'💪',col:'#00d68f',title:'Add $100 per week',detail:`${fA(wk100mo)}/month extra — a meaningful step.`,r:amort({balance:bal,offset:off,ratePA:rate,pmt:pmt+wk100mo,ppy:12}),act:{e:wk100mo,f:false,l:0}},
    {icon:'🎁',col:'#fbbf24',title:'Put your tax refund at it each year',detail:`$3,000 annual lump sum — no change to monthly budget.`,r:amort({balance:bal,offset:off,ratePA:rate,pmt,ppy:12,lump:3000}),act:{e:0,f:false,l:3000}},
    {icon:'🪣',col:'#c084fc',title:'Grow your offset by $10,000',detail:`Saves ${fA(10000*rate/100)}/yr — and it's still your money.`,r:amort({balance:bal,offset:off+10000,ratePA:rate,pmt,ppy:12}),act:null},
    {icon:'🚀',col:'#00d68f',title:'Fortnightly + $50/week',detail:`Both strategies combined for maximum compound effect.`,r:amort({balance:bal,offset:off,ratePA:rate,pmt:pmt/2+wk50mo/2,ppy:26}),act:{e:wk50mo,f:true,l:0}},
  ]:[];
  const suggHTML=SUGG.length?SUGG.map(s=>{
    const{mo,int}=sv(s.r);
    const badge=(t,c)=>`<span style="padding:4px 10px;border-radius:6px;background:${c}20;color:${c};font-size:12px;font-weight:700;font-family:'DM Mono',monospace">${t}</span>`;
    return`<div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-left:3px solid ${s.col};border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px">
      <div style="font-size:20px;flex-shrink:0">${s.icon}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;margin-bottom:3px">${s.title}</div>
        <div style="font-size:12px;color:#4b5674;margin-bottom:8px;line-height:1.5">${s.detail}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          ${mo>0?badge('⏱ '+fY(mo)+' sooner','#00d68f'):''}${int>0?badge('💰 Save '+fA(int),'#00d68f'):''}
          ${s.act?`<button onclick="goToCalc(${s.act.e},${s.act.f},${s.act.l})" style="padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#4b5674;font-size:12px;cursor:pointer">Try in calculator →</button>`:''}
        </div>
      </div>
    </div>`;
  }).join(''):`<p style="color:#4b5674;font-size:13px">Enter your loan details in Settings to see suggestions.</p>`;

  // ── Extra payments ────────────────────────────────────────────────────────
  const erows=[...D.repayments].sort((a,b)=>b.date.localeCompare(a.date));
  const etotal=D.repayments.reduce((s,r)=>s+r.amount,0);
  const TC={offset:'#38bdf8',principal:'#00d68f',lump:'#fbbf24',windfall:'#c084fc'};
  const TL={offset:'Offset',principal:'Repayment',lump:'Lump Sum',windfall:'Windfall'};
  const extraHTML=`<div style="background:linear-gradient(135deg,rgba(0,214,143,.07),rgba(56,189,248,.03));border:1px solid rgba(0,214,143,.2);border-radius:12px;padding:16px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:#00d68f;margin-bottom:12px">Log a separate extra payment</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:12px">
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Date</label><input id="e-date" type="date" value="${new Date().toISOString().split('T')[0]}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Amount ($)</label><input id="e-amt" placeholder="e.g. 5000" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Type</label><select id="e-type" style="${INP_str}"><option value="offset">Added to Offset</option><option value="principal">Extra Repayment</option><option value="lump">Annual Lump Sum</option><option value="windfall">Windfall</option></select></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Description</label><input id="e-desc" placeholder="e.g. Tax refund" style="${INP_str}"></div>
    </div>
    ${pbtn('✓ Log','e-save','#00d68f')}
    <p style="font-size:11px;color:#4b5674;margin-top:10px;margin-bottom:0">Use this for separate transfers — tax refunds, bonuses, windfalls. Regular payments are logged automatically from the Dashboard.</p>
  </div>
  ${erows.length===0?`<p style="color:#4b5674;font-size:13px;padding:4px 0">No extra payments yet.</p>`
    :`<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Amount</th><th>Type</th><th>Description</th><th></th></tr></thead><tbody>
    ${erows.map(r=>`<tr><td style="font-family:'DM Mono',monospace">${new Date(r.date+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}</td><td style="font-family:'DM Mono',monospace;font-weight:700;color:#00d68f">${fA(r.amount)}</td><td><span class="tag" style="background:${(TC[r.type]||'#4b5674')}20;color:${TC[r.type]||'#4b5674'}">${TL[r.type]||r.type}</span></td><td style="color:#4b5674">${esc(r.description)||'—'}</td><td><button onclick="delRepayment('${r.id}')" style="background:none;border:none;color:#4b5674;font-size:18px;padding:2px 8px;cursor:pointer">✕</button></td></tr>`).join('')}
    </tbody></table></div>${etotal>0?`<div style="font-size:13px;color:#00d68f;font-family:'DM Mono',monospace;font-weight:700;padding-top:8px">${fA(etotal)} total</div>`:''}`}`;

  // ── History ───────────────────────────────────────────────────────────────
  const hrows=[...D.history].sort((a,b)=>b.month.localeCompare(a.month));
  const histHTML=hrows.length===0?`<p style="color:#4b5674;font-size:13px;padding:4px 0">No payments recorded yet.</p>`
    :`<div style="overflow-x:auto"><table><thead><tr><th>Month</th><th>Balance</th><th>Offset</th><th>Change</th><th></th></tr></thead><tbody>
    ${hrows.map((h,i)=>{const nx=hrows[i+1],ch=nx?h.balance-nx.balance:null;const chStr=ch!=null?`<span style="font-family:'DM Mono',monospace;color:${ch>0?'#00d68f':'#f87171'};font-weight:600">${ch>0?'↓':ch<0?'↑':'–'}${ch!==0?' '+fA(Math.abs(ch)):''}</span>`:'';return`<tr><td><span style="font-family:'DM Mono',monospace;font-weight:600">${fMo(h.month)}</span></td><td style="font-family:'DM Mono',monospace">${fA2(h.balance)}</td><td style="font-family:'DM Mono',monospace;color:#00d68f">${fA(h.offset)}</td><td>${chStr}</td><td><button onclick="delHistory('${h.id}')" style="background:none;border:none;color:#4b5674;font-size:18px;padding:2px 8px;cursor:pointer" title="Delete this entry">✕</button></td></tr>`;}).join('')}
    </tbody></table></div><div style="font-size:11px;color:#4b5674;padding:8px 0">${hrows.length} entries · tap ✕ to delete</div>`;

  // ── Settings ──────────────────────────────────────────────────────────────
  const settHTML=`<div class="card" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px">Loan Details</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px">
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Loan Balance ($)</label><input id="s-bal" value="${l.balance?Math.round(l.balance*100)/100:''}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Offset Balance ($)</label><input id="s-off" value="${l.offset?Math.round(l.offset*100)/100:''}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Interest Rate (% p.a.)</label><input id="s-rate" value="${l.rate||''}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Monthly Repayment ($)</label><input id="s-pmt" value="${l.payment||''}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Original Loan Amount ($)</label><input id="s-orig" value="${l.origBalance||''}" style="${INP_str}"></div>
      <div><label style="font-size:11px;color:#4b5674;display:block;margin-bottom:5px">Original End Date (YYYY-MM)</label><input id="s-end" value="${l.origEnd||''}" style="${INP_str}"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      ${pbtn('💾 Save Loan Details','s-save','#38bdf8')}
      <span id="s-msg" style="font-size:12px;color:#00d68f;font-family:'DM Mono',monospace"></span>
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">Data</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${pbtn('⬇ Export Backup','s-export','#00d68f')}
      ${pbtn('⬆ Import','s-import','#38bdf8')}
      <button id="s-reset" style="padding:10px 18px;border-radius:8px;border:1px solid rgba(248,113,113,.4);background:rgba(248,113,113,.1);color:#f87171;font-weight:700;font-size:14px;cursor:pointer">🗑 Reset</button>
    </div>
  </div>`;

  return`<div>
    ${collSec('calc','🧮','Scenarios & Calculator',`
      <div style="background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(192,132,252,.04));border:1px solid rgba(56,189,248,.2);border-radius:12px;padding:18px;margin-bottom:14px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:16px">
          ${slRow('c-extra','c-extra-inp','Extra repayment / month',CXe.extra,2000,50,'#38bdf8')}
          ${slRow('c-lump','c-lump-inp','Annual lump sum',CXe.lump,15000,500,'#fbbf24')}
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <button id="c-fn" style="padding:8px 18px;border-radius:50px;border:none;background:${CXe.fn?'#38bdf8':'rgba(255,255,255,.09)'};color:${CXe.fn?'#07090f':'#94a3b8'};font-weight:700;font-size:13px;cursor:pointer">${CXe.fn?'✓ Fortnightly ON':'Switch to Fortnightly?'}</button>
        </div>
        <div id="calc-res" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;background:rgba(0,0,0,.2);border-radius:12px;padding:14px;margin-bottom:14px">
          ${[['Pays off',fD(cproj.months)],['Time left',fY(cproj.months)],['Sooner',cmoS>1?fY(cmoS)+' sooner':'—'],['Int. saved',cintS>100?fA(cintS):'—']].map(([l,v])=>`<div style="text-align:center"><div style="font-size:9px;color:#4b5674;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px">${l}</div><div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:#00d68f">${v}</div></div>`).join('')}
        </div>
        ${pbtn('💾 Save as My Strategy','c-save','#00d68f')}
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 16px 8px"><div style="font-weight:600;font-size:14px;margin-bottom:2px">Annual Lump Sum Reference</div><p style="font-size:12px;color:#4b5674;margin:0">What a yearly lump sum does to your loan</p></div>
        <div style="overflow-x:auto"><table><thead><tr><th>Per Year</th><th>Pays Off</th><th>Duration</th><th>Time Saved</th><th>Int. Saved</th></tr></thead><tbody>${LUMPROWS}</tbody></table></div>
      </div>`)}
    ${collSec('sugg','💡','Suggestions',suggHTML)}
    ${collSec('extra','➕','Extra Payments',extraHTML)}
    ${collSec('hist','📅','Payment History',histHTML)}
    ${collSec('sett','⚙️','Settings',settHTML)}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════════════════════════
window.delHistory=id=>{D.history=D.history.filter(h=>h.id!==id);saveData();renderApp();};
window.delRepayment=id=>{D.repayments=D.repayments.filter(r=>r.id!==id);saveData();renderApp();};
window.markTransferred=id=>{const e=D.history.find(h=>h.id===id);if(e)e.extraTransferred=true;saveData();renderApp();};
window.goToCalc=(extra,fn,lump)=>{if(!window._CX)window._CX={};window._CX.extra=extra;window._CX.fn=!!fn;window._CX.lump=lump;setTab('tools');};

let TAB='dash';
function setTab(id){TAB=id;renderApp();}

// ═══════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════
function attachEvents(){
  // ── Payment logger (Dashboard) ─────────────────────────────────────
  function updatePaymentPreview(){
    const lastEntry=D.history.length>0?D.history[D.history.length-1]:D.loan;
    const lastBal=lastEntry.balance||D.loan.balance||0;
    const off=parseFloat((document.getElementById('h-off')?.value||'').replace(/[^0-9.]/g,''))||0;
    const paid=parseFloat((document.getElementById('h-paid')?.value||'').replace(/[^0-9.]/g,''))||D.loan.payment||5832;
    const rate=D.loan.rate||6.04,minPmt=D.loan.payment||5832;
    const int=Math.max(0,lastBal-off)*rate/100/12;
    const principal=Math.max(0,paid-int);
    const newBal=Math.round(Math.max(0,lastBal-principal)*100)/100;
    const extra=Math.max(0,paid-minPmt);
    const prev=document.getElementById('h-preview');
    const nb=document.getElementById('h-newbal');
    if(prev)prev.innerHTML=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px">
      <span style="color:${C.muted}">Interest: <strong style="color:${C.red};font-family:'DM Mono',monospace">${fA(int)}</strong></span>
      <span style="color:${C.muted}">Principal: <strong style="color:${C.green};font-family:'DM Mono',monospace">${fA(principal)}</strong></span>
      ${extra>0?`<span style="color:${C.green};font-size:12px">✓ +${fA(extra)} above minimum</span>`:''}
    </div>`;
    if(nb){nb.textContent=fA2(newBal);}
    return{newBal,off,paid,extra,rate};
  }
  ['h-paid','h-off'].forEach(id=>document.getElementById(id)?.addEventListener('input',updatePaymentPreview));
  document.getElementById('h-rate-toggle')?.addEventListener('click',()=>{
    const p=document.getElementById('h-rate-panel'),a=document.getElementById('h-rate-arrow');
    const open=p?.style.display==='none';if(p)p.style.display=open?'block':'none';if(a)a.textContent=open?'▼':'▶';
  });
  document.getElementById('h-save')?.addEventListener('click',()=>{
    const ratePanel=document.getElementById('h-rate-panel');
    if(ratePanel?.style.display!=='none'){
      const nr=parseFloat(document.getElementById('h-rate')?.value)||D.loan.rate;
      const np=parseFloat((document.getElementById('h-newpmt')?.value||'').replace(/[^0-9.]/g,''))||D.loan.payment;
      D.loan.rate=nr;D.loan.payment=np;
    }
    const{newBal,off,paid,extra,rate}=updatePaymentPreview();
    if(!newBal||!paid)return;
    const m=nowYM();
    const entry={id:gid(),month:m,balance:newBal,offset:off,rate:rate,note:''};
    if(extra>0){entry.extra=extra;entry.extraTransferred=false;}
    const idx=D.history.findIndex(h=>h.month===m);
    if(idx>=0)D.history[idx]={...D.history[idx],...entry,id:D.history[idx].id};
    else D.history=[...D.history,entry].sort((a,b)=>a.month.localeCompare(b.month));
    D.loan.balance=newBal;D.loan.offset=off;D.loan.rate=rate;
    if(extra>0)D.repayments.push({id:gid(),date:new Date().toISOString().split('T')[0],amount:extra,description:'Extra in regular payment — '+fMo(m),type:'principal'});
    saveData();
    const msg=document.getElementById('h-msg');if(msg){msg.textContent=`✓ Recorded — balance now ${fA2(newBal)}`;setTimeout(()=>msg.textContent='',4000);}
    // Refresh just the balance/payoff display without full re-render
    setTimeout(()=>renderApp(),100);
  });

  // ── Calculator (Tools) ─────────────────────────────────────────────
  const CX=window._CX||{extra:D.strategy.extraMonthly||0,lump:D.strategy.annualLump||0,fn:D.strategy.fortnightly||false};
  if(!window._CX)window._CX=CX;
  function updateCalc(){
    const l=D.loan,bal=l.balance,off=l.offset,rate=l.rate||6.04,pmt=l.payment||5832;
    const base=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy:12}):{months:Infinity,totalInt:Infinity};
    const cpmt=CX.fn?(pmt+CX.extra)/2:(pmt+CX.extra),cppy=CX.fn?26:12;
    const cproj=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt:cpmt,ppy:cppy,lump:CX.lump}):{months:Infinity,totalInt:Infinity};
    const moS=isFinite(base.months)&&isFinite(cproj.months)?base.months-cproj.months:0;
    const intS=isFinite(base.totalInt)&&isFinite(cproj.totalInt)?base.totalInt-cproj.totalInt:0;
    const el=document.getElementById('calc-res');
    if(el)el.innerHTML=[['Pays off',fD(cproj.months)],['Time left',fY(cproj.months)],['Sooner',moS>1?fY(moS)+' sooner':'—'],['Int. saved',intS>100?fA(intS):'—']].map(([lbl,v])=>`<div style="text-align:center"><div style="font-size:9px;color:#4b5674;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px">${lbl}</div><div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:#00d68f">${v}</div></div>`).join('');
  }
  function syncSlider(sid,iid,maxV,key,col){
    const sl=document.getElementById(sid),inp=document.getElementById(iid);
    if(!sl||!inp)return;
    sl.addEventListener('input',function(){CX[key]=+this.value;if(document.activeElement!==inp)inp.value=CX[key].toLocaleString('en-AU');inp.style.color=col;updateCalc();});
    inp.addEventListener('input',function(){const r=this.value.replace(/[^0-9]/g,'');if(!r)return;CX[key]=+r;sl.value=Math.min(+r,maxV);updateCalc();});
    inp.addEventListener('blur',function(){const v=Math.min(+(this.value.replace(/[^0-9]/g,'')||0),maxV);CX[key]=v;this.value=v.toLocaleString('en-AU');sl.value=v;updateCalc();});
  }
  syncSlider('c-extra','c-extra-inp',2000,'extra','#38bdf8');
  syncSlider('c-lump','c-lump-inp',15000,'lump','#fbbf24');
  document.getElementById('c-fn')?.addEventListener('click',function(){
    CX.fn=!CX.fn;this.textContent=CX.fn?'✓ Fortnightly ON':'Switch to Fortnightly?';
    this.style.background=CX.fn?'#38bdf8':'rgba(255,255,255,.09)';this.style.color=CX.fn?'#07090f':'#94a3b8';
    updateCalc();
  });
  document.getElementById('c-save')?.addEventListener('click',()=>{
    D.strategy={extraMonthly:CX.extra,fortnightly:CX.fn,annualLump:CX.lump};saveData();
    const b=document.getElementById('c-save');if(b){const t=b.textContent;b.textContent='✓ Saved!';setTimeout(()=>b.textContent=t,2000);}
  });

  // ── Extra payments ─────────────────────────────────────────────────
  document.getElementById('e-save')?.addEventListener('click',()=>{
    const a=parseFloat((document.getElementById('e-amt')?.value||'').replace(/[^0-9.]/g,''));
    if(!a||a<=0)return;
    D.repayments.push({id:gid(),date:document.getElementById('e-date')?.value,amount:a,description:(document.getElementById('e-desc')?.value||'').trim(),type:document.getElementById('e-type')?.value||'principal'});
    saveData();renderApp();
  });

  // ── Settings ───────────────────────────────────────────────────────
  document.getElementById('s-save')?.addEventListener('click',()=>{
    const np=id=>parseFloat((document.getElementById(id)?.value||'').replace(/[^0-9.]/g,''))||0;
    D.loan.balance=np('s-bal');D.loan.offset=np('s-off');
    D.loan.rate=parseFloat(document.getElementById('s-rate')?.value)||6.04;
    D.loan.payment=np('s-pmt');D.loan.origBalance=np('s-orig');
    D.loan.origEnd=document.getElementById('s-end')?.value||'2051-09';
    saveData();const m=document.getElementById('s-msg');if(m){m.textContent='Saved ✓';setTimeout(()=>m.textContent='',2500);}
    renderApp();
  });
  document.getElementById('s-export')?.addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`mortgage-backup-${nowYM()}.json`;a.click();URL.revokeObjectURL(url);
  });
  document.getElementById('s-import')?.addEventListener('click',()=>{
    const i=document.createElement('input');i.type='file';i.accept='.json';
    i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
      r.onload=ev=>{try{D=JSON.parse(ev.target.result);saveData();renderApp();}catch{alert('Invalid file');}};r.readAsText(f);};i.click();
  });
  document.getElementById('s-reset')?.addEventListener('click',()=>{
    if(confirm('Reset ALL data?')){D=JSON.parse(JSON.stringify(INIT));saveData();renderApp();}
  });
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
const TABS=[{id:'dash',i:'🏠',l:'Dashboard'},{id:'tools',i:'🔧',l:'Tools'}];

function renderApp(){
  const cur=TABS.find(t=>t.id===TAB)||TABS[0];
  document.getElementById('app').innerHTML=`
<div style="background:#0c1018;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:20">
  <div style="max-width:860px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex">
      ${TABS.map(t=>`<button onclick="setTab('${t.id}')" style="padding:14px 16px;border:none;background:transparent;color:${TAB===t.id?C.blue:C.muted};font-weight:${TAB===t.id?700:500};font-size:14px;cursor:pointer;border-bottom:2px solid ${TAB===t.id?C.blue:'transparent'};display:flex;align-items:center;gap:7px;transition:color .15s">
        <span>${t.i}</span><span>${t.l}</span>
      </button>`).join('')}
    </div>
    <div id="si" style="font-size:11px;color:${C.muted};font-family:'DM Mono',monospace"></div>
  </div>
</div>
<div style="background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(56,189,248,.08),transparent);border-bottom:1px solid rgba(255,255,255,.05);padding:18px 16px 14px">
  <div style="max-width:860px;margin:0 auto">
    <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:${C.blue};text-transform:uppercase;margin-bottom:4px">Home Loan · Melbourne</div>
    <h1 style="font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:800;letter-spacing:-1px;margin:0">${cur.i} ${cur.l}</h1>
  </div>
</div>
<div style="max-width:860px;margin:0 auto;padding:24px 16px 60px">
  ${TAB==='dash'?renderDash():renderTools()}
</div>`;
  attachEvents();
}

renderApp();
</script>
