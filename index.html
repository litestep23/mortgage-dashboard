<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mortgage Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:#07090f;min-height:100vh;font-family:'Mulish',sans-serif;color:#e2e8f5}
input,select,textarea,button{font-family:'Mulish',sans-serif}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:rgba(56,189,248,.5)!important}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;cursor:pointer;background:rgba(255,255,255,.15)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;border:2px solid #07090f;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:4px}
button{cursor:pointer}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#4b5674;text-transform:uppercase;letter-spacing:1.2px;padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:10px;font-size:13px;color:#e2e8f5;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.surf{background:#0c1018;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── NO EXTERNAL DEPENDENCIES — pure vanilla JS ────────────────────────────────
const C={bg:'#07090f',surf:'#0c1018',border:'rgba(255,255,255,.07)',text:'#e2e8f5',muted:'#4b5674',green:'#00d68f',blue:'#38bdf8',amber:'#fbbf24',red:'#f87171',purple:'#c084fc',orange:'#fb923c'};
const INP=`background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e2e8f5;font-size:13px;padding:8px 10px;width:100%`;
const SK='mortgageDashV1';

// ── Utils ─────────────────────────────────────────────────────────────────────
const fA=n=>!isFinite(n)?'—':new Intl.NumberFormat('en-AU',{style:'currency',currency:'AUD',maximumFractionDigits:0}).format(n);
const fD=m=>{if(!isFinite(m)||m>900)return'—';const d=new Date();d.setMonth(d.getMonth()+Math.round(m));return d.toLocaleDateString('en-AU',{month:'short',year:'numeric'})};
const fY=m=>{if(!isFinite(m)||m>900||m<0)return'—';const y=Math.floor(m/12),mo=Math.round(m%12);return y===0?`${mo}mo`:mo===0?`${y}y`:`${y}y ${mo}mo`};
const fMo=s=>{if(!s)return'';const[y,m]=s.split('-');return new Date(+y,+m-1).toLocaleDateString('en-AU',{month:'short',year:'numeric'})};
const nowYM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Amortise ──────────────────────────────────────────────────────────────────
function amort({balance,offset,ratePA,pmt,ppy=12,lump=0}){
  const r=ratePA/100/ppy;let bal=balance,ti=0,p=0;
  const pts=[{y:0,b:Math.round(bal)}];
  while(bal>0.5&&p<ppy*55){
    const eff=Math.max(0,bal-offset),int=eff*r,pr=pmt-int;
    if(pr<=0.005)return{months:Infinity,totalInt:Infinity,pts};
    ti+=int;bal=Math.max(0,bal-Math.min(pr,bal));p++;
    if(lump>0&&p%ppy===0&&bal>0)bal=Math.max(0,bal-lump);
    if(p%ppy===0)pts.push({y:p/ppy,b:Math.round(Math.max(0,bal))});
  }
  if(bal>0.5)return{months:Infinity,totalInt:Infinity,pts};
  if(p%ppy!==0)pts.push({y:Math.ceil(p/ppy),b:0});
  return{months:ppy===12?p:Math.round(p/ppy*12),totalInt:ti,pts};
}

// ── Storage ───────────────────────────────────────────────────────────────────
function loadData(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null}catch{return null}}
function saveData(){try{localStorage.setItem(SK,JSON.stringify(D));flashSaved()}catch(e){}}
function flashSaved(){const el=document.getElementById('si');if(el){el.textContent='✓ Saved';el.style.color=C.green;setTimeout(()=>{el.textContent='Mortgage Dashboard';el.style.color=C.muted},2500)}}

const INIT={loan:{balance:0,offset:0,rate:6.04,payment:0,origBalance:0,origEnd:'2051-09'},strategy:{extraMonthly:0,fortnightly:false,annualLump:0},history:[],repayments:[]};
let D=loadData()||JSON.parse(JSON.stringify(INIT));
let TAB='dash';

// ── Chart ─────────────────────────────────────────────────────────────────────
function buildChart(hist,proj,base){
  const baseYear=new Date().getFullYear();
  const hM={},pM={},bM={};
  hist.forEach(h=>{const yr=h.month?parseInt(h.month.split('-')[0])-baseYear:0;if(yr>=0)hM[yr]=h.balance});
  proj.pts.forEach(p=>pM[p.y]=p.b);
  base.pts.forEach(p=>bM[p.y]=p.b);
  return Array.from({length:31},(_,y)=>{
    const pt={year:y,label:String(baseYear+y)};
    if(hM[y]!=null)pt.actual=hM[y];
    if(pM[y]!=null)pt.projected=pM[y];else if(isFinite(proj.months)&&y>proj.months/12)pt.projected=0;
    if(bM[y]!=null)pt.noExtra=bM[y];else if(isFinite(base.months)&&y>base.months/12)pt.noExtra=0;
    return pt;
  });
}

function svgChart(data){
  const W=800,H=190,PL=56,PB=24,PT=8,PR=8,iW=W-PL-PR,iH=H-PT-PB;
  const allV=data.flatMap(d=>[d.actual,d.projected,d.noExtra].filter(v=>v!=null));
  if(!allV.length)return'';
  const maxY=Math.max(...allV)||1;
  const px=y=>PL+(y/30)*iW,py=v=>PT+iH-(v/maxY)*iH;
  const pts=key=>data.filter(d=>d[key]!=null).map(d=>`${px(d.year).toFixed(0)},${py(d[key]).toFixed(0)}`).join(' ');
  const yTk=[0,.25,.5,.75,1].map(t=>({v:maxY*t,y:py(maxY*t)}));
  const xTk=data.filter(d=>d.year%5===0);
  return`<div>
<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
  ${yTk.map(t=>`<line x1="${PL}" x2="${W-PR}" y1="${t.y.toFixed(0)}" y2="${t.y.toFixed(0)}" stroke="rgba(255,255,255,.04)"/>
  <text x="${PL-4}" y="${(t.y+4).toFixed(0)}" text-anchor="end" font-size="10" fill="${C.muted}">$${(t.v/1000).toFixed(0)}K</text>`).join('')}
  ${xTk.map(d=>`<text x="${px(d.year).toFixed(0)}" y="${H-3}" text-anchor="middle" font-size="10" fill="${C.muted}">${d.label}</text>`).join('')}
  ${pts('noExtra')?`<polyline points="${pts('noExtra')}" fill="none" stroke="${C.red}" stroke-width="1.5" stroke-dasharray="5,3"/>`:''}
  ${pts('projected')?`<polyline points="${pts('projected')}" fill="none" stroke="${C.blue}" stroke-width="2"/>`:''}
  ${pts('actual')?`<polyline points="${pts('actual')}" fill="none" stroke="${C.green}" stroke-width="2.5"/>`:''}
  ${data.filter(d=>d.actual!=null).map(d=>`<circle cx="${px(d.year).toFixed(0)}" cy="${py(d.actual).toFixed(0)}" r="4" fill="${C.green}" stroke="${C.bg}" stroke-width="2"/>`).join('')}
</svg>
<div style="display:flex;gap:18px;font-size:11px;color:${C.muted};justify-content:center;margin-top:6px">
  <span style="display:flex;align-items:center;gap:5px"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="${C.red}" stroke-width="1.5" stroke-dasharray="4,3"/></svg>No extras</span>
  <span style="display:flex;align-items:center;gap:5px"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="${C.blue}" stroke-width="2"/></svg>Strategy</span>
  <span style="display:flex;align-items:center;gap:5px"><svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="${C.green}"/></svg>Actual</span>
</div></div>`;
}

// ── Shared HTML helpers ───────────────────────────────────────────────────────
const stat=(l,v,sub,accent)=>`<div style="flex:1 1 130px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid ${C.border};border-top:2px solid ${accent};border-radius:13px">
  <div style="font-size:9px;color:${C.muted};text-transform:uppercase;letter-spacing:1.4px;margin-bottom:5px">${l}</div>
  <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700">${v}</div>
  ${sub?`<div style="font-size:11px;color:${C.muted};margin-top:3px">${sub}</div>`:''}
</div>`;

const kv=(l,v,c)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid ${C.border}">
  <span style="font-size:12px;color:${C.muted}">${l}</span>
  <span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:${c||C.text}">${v}</span>
</div>`;

const pbtn=(l,id,bg)=>`<button id="${id}" style="padding:9px 18px;border-radius:8px;border:none;background:${bg||C.blue};color:#07090f;font-weight:700;font-size:13px">${l}</button>`;
const gbtn=(l,id,col)=>`<button id="${id}" style="padding:9px 18px;border-radius:8px;border:1px solid ${col}40;background:${col}15;color:${col};font-weight:600;font-size:13px">${l}</button>`;

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash(){
  const hist=D.history,latest=hist.length>0?hist[hist.length-1]:D.loan;
  const{balance:bal,offset:off,rate}=latest;
  if(!bal)return`<div style="text-align:center;padding:60px 20px;color:${C.muted}">
    <div style="font-size:40px;margin-bottom:16px">🏠</div>
    <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:${C.text};margin-bottom:8px">Welcome to your Mortgage Dashboard</div>
    <p style="font-size:14px;line-height:1.7;margin-bottom:24px">Start by entering your loan details in Settings,<br>then record your first month in History.</p>
    ${pbtn('⚙️ Go to Settings','go-sett',C.blue)}
  </div>`;

  const st=D.strategy,pmt=st.fortnightly?(D.loan.payment+st.extraMonthly)/2:(D.loan.payment+st.extraMonthly),ppy=st.fortnightly?26:12;
  const proj=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy,lump:st.annualLump}):{months:Infinity,totalInt:Infinity,pts:[]};
  const base=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt:D.loan.payment||5832,ppy:12}):{months:Infinity,totalInt:Infinity,pts:[]};
  const origBal=D.loan.origBalance||bal||1,eff=Math.max(0,bal-off);
  const paidPct=origBal>0?((origBal-bal)/origBal*100).toFixed(1):'0.0';
  const dropped=hist.length>0?hist[0].balance-bal:0;
  const moSaved=isFinite(base.months)&&isFinite(proj.months)?base.months-proj.months:0;
  const totalExtra=D.repayments.reduce((s,r)=>s+r.amount,0);
  const chartData=buildChart(hist,proj,base);

  return`<div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
  ${stat('Current Balance',fA(bal),`as of ${hist.length>0?fMo(latest.month):'now'}`,C.red)}
  ${stat('Effective Balance',fA(eff),`Offset: ${fA(off)}`,C.blue)}
  ${stat('Interest Rate',`${rate}% p.a.`,'',C.amber)}
  ${stat('Offset Saves / Year',fA(off*rate/100),`${fA(off*rate/100/365)}/day`,C.green)}
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
  <div class="surf">
    <div style="font-size:11px;color:${C.muted};text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Loan Progress</div>
    <div style="background:rgba(255,255,255,.06);border-radius:999px;height:8px;margin-bottom:8px;overflow:hidden">
      <div style="width:${paidPct}%;height:100%;background:linear-gradient(90deg,${C.green},${C.blue});border-radius:999px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:${C.muted};margin-bottom:14px">
      <span>0</span><span style="color:${C.text};font-weight:700">${paidPct}% paid off</span><span>${fA(origBal)}</span>
    </div>
    ${kv('Balance reduced since tracking',fA(dropped),C.green)}
    ${kv('Extra repayments logged',fA(totalExtra),C.green)}
    ${kv('Months tracked',`${hist.length}`)}
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div style="background:linear-gradient(135deg,rgba(0,214,143,.08),rgba(56,189,248,.04));border:1px solid rgba(0,214,143,.2);border-radius:18px;padding:18px">
      <div style="font-size:11px;color:${C.green};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">This Month</div>
      ${kv('Interest charge',fA(eff*rate/100/12),C.red)}
      ${kv('Principal reduction',fA((D.loan.payment||0)-eff*rate/100/12),C.green)}
      ${kv('Daily offset saving',`${fA(off*rate/100/365)}/day`,C.blue)}
    </div>
    <div class="surf" style="flex:1">
      <div style="font-size:11px;color:${C.muted};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Strategy Projection</div>
      ${kv('Pay off',fD(proj.months))}
      ${kv('Time remaining',fY(proj.months))}
      ${kv('Saved vs no extras',moSaved>0?fY(moSaved)+' sooner':'—',C.green)}
      ${kv('Total interest',fA(proj.totalInt))}
    </div>
  </div>
</div>
<div class="surf" style="margin-bottom:20px">
  <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px">📈 Balance Over Time</div>
  <p style="font-size:12px;color:${C.muted};margin:0 0 16px">Actual history · Your strategy · No-extras baseline</p>
  ${svgChart(chartData)}
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap">
  ${pbtn('📅 Record This Month','go-track',C.green)}
  ${pbtn('➕ Log Extra Payment','go-extra',C.blue)}
  <button id="go-sett2" style="padding:9px 18px;border-radius:8px;border:1px solid ${C.border};background:transparent;color:${C.muted};font-weight:600;font-size:13px">⚙️ Settings</button>
</div></div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderTrack(){
  const rows=[...D.history].sort((a,b)=>b.month.localeCompare(a.month));
  const tableRows=rows.map((h,i)=>{
    const nx=rows[i+1],ch=nx?h.balance-nx.balance:null;
    const chStr=ch!=null?`<span style="font-family:'DM Mono',monospace;color:${ch>0?C.green:C.red};font-weight:600">${ch>0?'↓':ch<0?'↑':'–'}${ch!==0?' '+fA(Math.abs(ch)):''}</span>`:'';
    return`<tr>
      <td><span style="font-family:'DM Mono',monospace;font-weight:600">${fMo(h.month)}</span></td>
      <td style="font-family:'DM Mono',monospace">${fA(h.balance)}</td>
      <td style="font-family:'DM Mono',monospace;color:${C.green}">${fA(h.offset)}</td>
      <td style="font-family:'DM Mono',monospace;color:${C.blue}">${fA(Math.max(0,h.balance-h.offset))}</td>
      <td style="font-family:'DM Mono',monospace">${h.rate}%</td>
      <td>${chStr}</td>
      <td style="color:${C.muted};font-size:12px">${esc(h.note)||'—'}</td>
      <td><button onclick="delHistory('${h.id}')" style="background:none;border:none;color:${C.muted};font-size:14px;padding:2px 6px;cursor:pointer">✕</button></td>
    </tr>`;
  }).join('');

  return`<div>
<div style="margin-bottom:18px">
  <h2 style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px">📅 Monthly Balance Tracker</h2>
  <p style="font-size:12px;color:${C.muted};margin:0">Record your loan balance and offset each month to track progress over time.</p>
</div>
<div style="background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(192,132,252,.03));border:1px solid rgba(56,189,248,.2);border-radius:18px;padding:22px;margin-bottom:24px">
  <div style="font-size:13px;font-weight:700;color:${C.blue};margin-bottom:16px">Add / Update a Month</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:14px">
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Month</label>
      <input id="h-month" type="month" value="${nowYM()}" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Loan Balance ($)</label>
      <input id="h-bal" placeholder="e.g. 920000" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Offset Balance ($)</label>
      <input id="h-off" placeholder="e.g. 85000" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Rate (% p.a.)</label>
      <input id="h-rate" type="number" step="0.01" value="${D.loan.rate}" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Note (optional)</label>
      <input id="h-note" placeholder="Rate drop, extra payment…" style="${INP}"></div>
  </div>
  ${pbtn('✓ Save Entry','h-save',C.green)}
  <p style="font-size:11px;color:${C.muted};margin-top:10px;margin-bottom:0">If the month already exists it updates in place and refreshes your dashboard.</p>
</div>
${rows.length===0
  ?`<div style="text-align:center;padding:40px 0;color:${C.muted};font-size:13px">No entries yet — add your first month above ↑</div>`
  :`<div class="surf" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table><thead><tr><th>Month</th><th>Balance</th><th>Offset</th><th>Effective</th><th>Rate</th><th>Change</th><th>Note</th><th></th></tr></thead>
      <tbody>${tableRows}</tbody></table>
    </div>
    <div style="padding:10px 14px;font-size:11px;color:${C.muted}">${rows.length} entries · ↓ = balance dropped (good) · newest first</div>
  </div>`}
</div>`;
}

// ── REPAYMENTS ────────────────────────────────────────────────────────────────
function renderExtra(){
  const rows=[...D.repayments].sort((a,b)=>b.date.localeCompare(a.date));
  const total=D.repayments.reduce((s,r)=>s+r.amount,0);
  const TC={offset:C.blue,principal:C.green,lump:C.amber,windfall:C.purple};
  const TL={offset:'Offset',principal:'Repayment',lump:'Lump Sum',windfall:'Windfall'};
  const tableRows=rows.map(r=>`<tr>
    <td style="font-family:'DM Mono',monospace">${new Date(r.date+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}</td>
    <td style="font-family:'DM Mono',monospace;font-weight:700;color:${C.green}">${fA(r.amount)}</td>
    <td><span class="tag" style="background:${(TC[r.type]||C.muted)}20;color:${TC[r.type]||C.muted}">${TL[r.type]||r.type}</span></td>
    <td style="color:${C.muted}">${esc(r.description)||'—'}</td>
    <td><button onclick="delRepayment('${r.id}')" style="background:none;border:none;color:${C.muted};font-size:14px;padding:2px 6px;cursor:pointer">✕</button></td>
  </tr>`).join('');

  return`<div>
<div style="margin-bottom:18px">
  <h2 style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px">➕ Extra Repayments Tracker</h2>
  <p style="font-size:12px;color:${C.muted};margin:0">Log any payments beyond your minimum — tax refunds, bonuses, windfalls.</p>
</div>
${total>0?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
  ${stat('Total Extra Paid',fA(total),`${rows.length} payments`,C.green)}
  ${stat('Approx Annual Saving',`${fA(total*D.loan.rate/100)}/yr`,'if held in offset',C.amber)}
</div>`:''}
<div style="background:linear-gradient(135deg,rgba(0,214,143,.07),rgba(56,189,248,.03));border:1px solid rgba(0,214,143,.2);border-radius:18px;padding:22px;margin-bottom:22px">
  <div style="font-size:13px;font-weight:700;color:${C.green};margin-bottom:16px">Log a Payment</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:14px">
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Date</label>
      <input id="e-date" type="date" value="${new Date().toISOString().split('T')[0]}" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Amount ($)</label>
      <input id="e-amt" placeholder="e.g. 5000" style="${INP}"></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Type</label>
      <select id="e-type" style="${INP}">
        <option value="offset">Added to Offset</option>
        <option value="principal">Extra Repayment</option>
        <option value="lump">Annual Lump Sum</option>
        <option value="windfall">Windfall</option>
      </select></div>
    <div><label style="font-size:11px;color:${C.muted};display:block;margin-bottom:5px">Description</label>

// ── CALCULATOR ────────────────────────────────────────────────────────────────
let CX={extra:0,lump:0,fn:false,wf:0};
function calcResults(){
  const latest=D.history.length>0?D.history[D.history.length-1]:D.loan;
  const{balance:bal,offset:off,rate}=latest;
  const pmt=CX.fn?(D.loan.payment+CX.extra)/2:(D.loan.payment+CX.extra),ppy=CX.fn?26:12;
  const base=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt:D.loan.payment||5832,ppy:12}):{months:Infinity,totalInt:Infinity};
  const proj=bal>0?amort({balance:bal,offset:off,ratePA:rate,pmt,ppy,lump:CX.lump}):{months:Infinity,totalInt:Infinity};
  const wfR=CX.wf>0&&bal>0?amort({balance:Math.max(0,bal-CX.wf),offset:off,ratePA:rate,pmt,ppy,lump:CX.lump}):null;
  const moS=isFinite(base.months)&&isFinite(proj.months)?base.months-proj.months:0;
  const intS=isFinite(base.totalInt)&&isFinite(proj.totalInt)?base.totalInt-proj.totalInt:0;
  return{base,proj,wfR,moS,intS,bal,off,rate,ppy,pmt};
}

function updateCalcDisplay(){
  const{proj,wfR,moS,intS}=calcResults();
  const el=document.getElementById('calc-res');
  if(!el)return;
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;background:rgba(0,0,0,.25);border-radius:14px;padding:16px;margin-bottom:14px">
      ${[['Pays off',fD(proj.months),C.text],['Time left',fY(proj.months),C.text],['Sooner',moS>1?fY(moS)+' sooner':'—',C.green],['Int. saved',intS>100?fA(intS):'—',C.green]].map(([l,v,c])=>`
        <div style="text-align:center">
          <div style="font-size:9px;color:${C.muted};text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px">${l}</div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:${c}">${v}</div>
        </div>`).join('')}
    </div>`;
  if(CX.wf>0&&wfR){
    const wfMo=calcResults().base&&isFinite(calcResults().base.months)&&isFinite(wfR.months)?calcResults().base.months-wfR.months:0;
    const wfInt=calcResults().base&&isFinite(calcResults().base.totalInt)&&isFinite(wfR.totalInt)?calcResults().base.totalInt-wfR.totalInt:0;
    const per1k=CX.wf>=1000&&wfInt>0?wfInt/(CX.wf/1000):0;
    const wfEl=document.getElementById('wf-res');
    if(wfEl)wfEl.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;background:rgba(0,0,0,.25);border-radius:12px;padding:14px;margin-bottom:12px">
        ${[['New payoff',fD(wfR.months)],['Time left',fY(wfR.months)],['Time saved',wfMo>0?fY(wfMo):'—'],['Int. saved',wfInt>0?fA(wfInt):'—']].map(([l,v])=>`
          <div style="text-align:center">
            <div style="font-size:9px;color:${C.muted};text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px">${l}</div>
            <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:${C.green}">${v}</div>
          </div>`).join('')}
      </div>
      ${per1k>0?`<div style="background:rgba(250,204,21,.07);border-radius:10px;padding:12px 14px;font-size:13px;color:#fef08a">
        💡 Every <strong>$1,000</strong> applied today saves ~<strong>${fA(per1k)}</strong> in total interest.
        ${wfInt>CX.wf?`<span style="color:${C.green}"> That's a <strong>${(wfInt/CX.wf).toFixed(1)}x</strong> return.</span>`:''}
      </div>`:''}`;
  }
}

// ── EVENT ATTACHMENT ──────────────────────────────────────────────────────────
function attachEvents(){
  // Dashboard
  document.getElementById('go-sett')?.addEventListener('click',()=>setTab('sett'));
  document.getElementById('go-sett2')?.addEventListener('click',()=>setTab('sett'));
  document.getElementById('go-track')?.addEventListener('click',()=>setTab('track'));
  document.getElementById('go-extra')?.addEventListener('click',()=>setTab('extra'));

  // History save
  document.getElementById('h-save')?.addEventListener('click',()=>{
    const b=parseFloat(document.getElementById('h-bal').value.replace(/[^0-9.]/g,''));
    const o=parseFloat(document.getElementById('h-off').value.replace(/[^0-9.]/g,''));
    const r=parseFloat(document.getElementById('h-rate').value);
    const m=document.getElementById('h-month').value;
    const n=document.getElementById('h-note').value.trim();
    if(!b||!o||!r)return;
    const entry={id:gid(),month:m,balance:b,offset:o,rate:r,note:n};
    const idx=D.history.findIndex(h=>h.month===m);
    if(idx>=0)D.history[idx]={...D.history[idx],...entry,id:D.history[idx].id};
    else D.history=[...D.history,entry].sort((a,b)=>a.month.localeCompare(b.month));
    D.loan.balance=b;D.loan.offset=o;D.loan.rate=r;
    saveData();setTab('track');
  });

  // Extra repayment save
  document.getElementById('e-save')?.addEventListener('click',()=>{
    const a=parseFloat(document.getElementById('e-amt').value.replace(/[^0-9.]/g,''));
    if(!a||a<=0)return;
    D.repayments.push({id:gid(),date:document.getElementById('e-date').value,amount:a,description:document.getElementById('e-desc').value.trim(),type:document.getElementById('e-type').value});
    saveData();setTab('extra');
  });

  // Calculator sliders
  const cExtra=document.getElementById('c-extra'),cLump=document.getElementById('c-lump');
  const updateSliders=()=>{
    CX.extra=+(cExtra?.value||0);CX.lump=+(cLump?.value||0);
    const lbl=document.getElementById('c-extra-lbl');if(lbl)lbl.textContent=fA(CX.extra);
    const llbl=document.getElementById('c-lump-lbl');if(llbl)llbl.textContent=fA(CX.lump);
    const ylbl=document.getElementById('c-yr-lbl');if(ylbl)ylbl.textContent=`${fA(CX.fn?(D.loan.payment+CX.extra)/2*26:(D.loan.payment+CX.extra)*12)}/yr`;
    updateCalcDisplay();
  };
  cExtra?.addEventListener('input',updateSliders);
  cLump?.addEventListener('input',updateSliders);
  document.getElementById('c-fn')?.addEventListener('click',function(){
    CX.fn=!CX.fn;this.textContent=CX.fn?'✓ Fortnightly ON':'Switch to Fortnightly?';
    this.style.background=CX.fn?C.blue:'rgba(255,255,255,.09)';this.style.color=CX.fn?'#07090f':'#94a3b8';
    updateCalcDisplay();
  });
  document.getElementById('c-save')?.addEventListener('click',()=>{
    D.strategy={extraMonthly:CX.extra,fortnightly:CX.fn,annualLump:CX.lump};
    saveData();
    const btn=document.getElementById('c-save');if(btn){const orig=btn.textContent;btn.textContent='✓ Saved!';setTimeout(()=>{btn.textContent=orig},2000);}
  });
  // Windfall
  const wfTxt=document.getElementById('wf-txt'),wfRange=document.getElementById('wf-range'),wfClear=document.getElementById('wf-clear');
  const updateWf=v=>{
    CX.wf=v;if(wfClear)wfClear.style.display=v>0?'block':'none';
    updateCalcDisplay();
  };
  wfTxt?.addEventListener('input',function(){const r=this.value.replace(/[^0-9]/g,'');this.value=r?Number(r).toLocaleString():'';const v=r?+r:0;if(wfRange)wfRange.value=Math.min(v,200000);updateWf(v);});
  wfRange?.addEventListener('input',function(){const v=+this.value;if(wfTxt)wfTxt.value=v>0?v.toLocaleString():'';updateWf(v);});
  wfClear?.addEventListener('click',()=>{CX.wf=0;if(wfTxt)wfTxt.value='';if(wfRange)wfRange.value=0;if(wfClear)wfClear.style.display='none';const el=document.getElementById('wf-res');if(el)el.innerHTML='';});
  if(TAB==='calc')updateCalcDisplay();

  // Settings save
  document.getElementById('s-save')?.addEventListener('click',()=>{
    const pn=id=>parseFloat((document.getElementById(id)?.value||'').replace(/[^0-9.]/g,''))||0;
    D.loan.balance    = pn('s-bal');
    D.loan.offset     = pn('s-off');
    D.loan.rate       = parseFloat(document.getElementById('s-rate')?.value)||6.04;
    D.loan.payment    = pn('s-pmt');
    D.loan.origBalance= pn('s-orig');
    D.loan.origEnd    = document.getElementById('s-end')?.value||'2051-09';
    saveData();
    renderApp(); // re-renders form from saved D.loan so user can see it stuck
  });
  document.getElementById('s-export')?.addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`mortgage-backup-${nowYM()}.json`;a.click();URL.revokeObjectURL(url);
  });
  document.getElementById('s-import')?.addEventListener('click',()=>{
    const i=document.createElement('input');i.type='file';i.accept='.json';
    i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
      r.onload=ev=>{try{D=JSON.parse(ev.target.result);saveData();setTab('sett');}catch{alert('Invalid backup file');}};r.readAsText(f);};
    i.click();
  });
  document.getElementById('s-reset')?.addEventListener('click',()=>{
    if(confirm('Reset ALL data? This cannot be undone.')){D=JSON.parse(JSON.stringify(INIT));saveData();setTab('dash');}
  });
}
